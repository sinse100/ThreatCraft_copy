services:
  threatcraft:
    container_name: threatcraft

    build:
      context: .
      args:
        UID: "${HOST_UID:-1000}"
        GID: "${HOST_GID:-1000}"

    ports:
      # 외부 네트워크에는 노출하지 않고 로컬 PC에서만 접속
      - "127.0.0.1:6080:6080"

    environment:
      DISPLAY: ":99"
      SCREEN_GEOMETRY: "1600x1000x24"
      TZ: "Asia/Seoul"
      BROWSER: "firefox-esr"

    volumes:
      # 사용자가 분석할 TM7 파일 및 기타 입력 파일
      - ./workspace:/workspace

      # ThreatCraft가 생성하는 결과 파일
      - ./output:/app/code/frontend/out

    # Firefox나 큰 그래프를 표시할 때 공유 메모리 부족 방지
    shm_size: "1gb"

    restart: unless-stopped
